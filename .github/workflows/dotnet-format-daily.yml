name: Daily code format check
on:
  schedule:
    - cron: 0 0 * * * # Every day at midnight (UTC)
jobs:
  dotnet-format:
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.head_ref }}

      - name: Install .NET SDK
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: 'microsoft'
          java-version: '21'

      - name: Install .NET MAUI Workload
        run: |
          dotnet workload install maui
          dotnet workload update

      # CS0612, CS0618, CS0672, CS1062 and CS1064 are excluded to stop `dotnet format` from applying
      # Roslyn's "Add [Obsolete]" code fix, which adds the [Obsolete] attribute to every member that
      # uses or overrides an obsolete API (see https://github.com/dotnet/format/issues/1230).
      # Excluding them here only affects `dotnet format`; `dotnet build` still reports these warnings.
      - name: Run dotnet format
        run: dotnet format samples/CommunityToolkit.Maui.Sample.slnx --exclude-diagnostics CS0612 CS0618 CS0672 CS1062 CS1064

      - name: Check for changes
        id: format
        shell: pwsh
        run: |
          if (git status --porcelain --untracked-files=no) {
            "has-changes=true" >> $env:GITHUB_OUTPUT
          } else {
            "has-changes=false" >> $env:GITHUB_OUTPUT
          }

      - name: Commit files
        if: steps.format.outputs.has-changes == 'true'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -a -m 'Automated dotnet-format update'

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          title: '[housekeeping] Automated PR to fix formatting errors'
          body: |
            Automated PR to fix formatting errors
          committer: GitHub <noreply@github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          labels: approved
          assignees: TheCodeTraveler
          reviewers: TheCodeTraveler
          branch: housekeeping/fix-codeformatting

      # Pushing won't work to forked repos
      # - name: Commit files
      #   if: steps.format.outputs.has-changes == 'true'
      #   run: |
      #     git config --local user.name "github-actions[bot]"
      #     git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
      #     git commit -a -m 'Automated dotnet-format update
      #     Co-authored-by: ${{ github.event.pull_request.user.login }} <${{ github.event.pull_request.user.id }}+${{ github.event.pull_request.user.login }}@users.noreply.github.com>'

      # - name: Push changes
      #   if: steps.format.outputs.has-changes == 'true'
      #   uses: ad-m/github-push-action@v0.6.0
      #   with:
      #     github_token: ${{ secrets.GITHUB_TOKEN }}
      #     branch: ${{ github.event.pull_request.head.ref }} 